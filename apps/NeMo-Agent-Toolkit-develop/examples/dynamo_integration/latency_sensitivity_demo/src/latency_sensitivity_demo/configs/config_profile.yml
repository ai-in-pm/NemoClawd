# =============================================================================
# PROFILER CONFIGURATION - Latency Sensitivity Demo (Dynamo LLM)
# =============================================================================
# Purpose: Build a prediction trie with auto-sensitivity scores
#
# Topology (7 LLM calls per workflow):
#
#                       ┌─── research_context   (LOW,  ~500 tok) ──────┐
#                       ├─── lookup_policy       (LOW,  ~500 tok) ──────┤
#   classify (HIGH) ──► ├─── check_compliance    (LOW,  ~500 tok) ──────├──► draft_response (MED) ──► review (HIGH)
#     (~5 tok)          └─── analyze_sentiment   (LOW,  ~500 tok) ──────┘       (~500 tok)              (~20 tok)
#
# The 4 parallel LOW-priority branches produce long outputs to saturate GPU
# decode at high concurrency.  HIGH-priority classify/review produce short
# outputs that benefit most from priority-based scheduling.
#
# Usage:
#   nat eval --reps 8 --config_file examples/dynamo_integration/latency_sensitivity_demo/src/latency_sensitivity_demo/configs/config_profile.yml
#
# Output: prediction_trie.json in the output directory
# =============================================================================

functions:
  classify_query:
    _type: classify_query
    llm: dynamo_llm
  research_context:
    _type: research_context
    llm: dynamo_llm
  lookup_policy:
    _type: lookup_policy
    llm: dynamo_llm
  check_compliance:
    _type: check_compliance
    llm: dynamo_llm
  analyze_sentiment:
    _type: analyze_sentiment
    llm: dynamo_llm
  draft_response:
    _type: draft_response
    llm: dynamo_llm
  review_response:
    _type: review_response
    llm: dynamo_llm

llms:
  dynamo_llm:
    _type: dynamo
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 8192
    max_sensitivity: 5

    # Dynamo nvext hints configuration
    enable_nvext_hints: false
    nvext_prefix_id_template: "latency-demo-{uuid}"
    # Static fallback values (not used because baseline does not use agent hints)
    nvext_prefix_total_requests: 7
    nvext_prefix_osl: MEDIUM
    nvext_prefix_iat: MEDIUM

workflow:
  _type: latency_sensitivity_demo
  classify_fn: classify_query
  research_fn: research_context
  policy_fn: lookup_policy
  compliance_fn: check_compliance
  sentiment_fn: analyze_sentiment
  draft_fn: draft_response
  review_fn: review_response

eval:
  general:
    max_concurrency: 16
    output:
      dir: ./examples/dynamo_integration/latency_sensitivity_demo/outputs/profile/
      cleanup: false
      job_management:
        append_job_id_to_output_dir: false
    dataset:
      _type: json
      file_path: ./examples/dynamo_integration/latency_sensitivity_demo/src/latency_sensitivity_demo/data/customer_queries.json
    profiler:
      compute_llm_metrics: true
      csv_exclude_io_text: true
      prediction_trie:
        enable: true
        auto_sensitivity: true
        sensitivity_scale: 5
        # Tuned weights for clear differentiation across the workflow topology:
        #   - w_position=0.5: first/last nodes score HIGH (U-shaped)
        #   - w_critical=0.35: long-running nodes score higher
        #   - w_fanout=0.15: entry node with many downstream calls gets a boost
        #   - w_parallel=0.5: strongly penalize parallel siblings with slack
        w_critical: 0.35
        w_fanout: 0.15
        w_position: 0.5
        w_parallel: 0.5
