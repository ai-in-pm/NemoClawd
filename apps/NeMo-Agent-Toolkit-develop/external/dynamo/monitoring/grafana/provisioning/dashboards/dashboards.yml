apiVersion: 1

providers:
  - name: 'Dynamo Dashboards'
    orgId: 1
    folder: 'Dynamo'
    folderUid: 'dynamo'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json








